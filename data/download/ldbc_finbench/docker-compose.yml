services:
  finbench-datagen:
    build: .
    image: finbench-data
    container_name: koumudi-finbench-data
    environment:
      SCALE_FACTORS: ${SCALE_FACTORS}
    volumes:
      - ./datagen:/home/user/ldbc_finbench
      - /data/pgprov/finbench:/home/user/data # host path : container path
      - ./post_process:/home/user/scripts
      - /data/pgprov/params/finbench/sf_${SCALE_FACTORS}/sf${SCALE_FACTORS}_read_params:/home/user/params
    working_dir: /home/user
    tty: true
    stdin_open: true
